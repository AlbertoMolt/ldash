<dialog class="create-profile-dialog" id="create-profile-dialog">
    <h2 class="title">Create profile</h2>
    <div class="section-container">
        <input type="text" id="create-profile-input" name="create-profile-input" placeholder="Profile name...">
    </div>
    <div class="dialog-actions">
        <button class="success-btn" id="create-profile-btn">Apply</button>
        <button class="cancel-btn" id="cancel-btn">Cancel</button>
    </div>
</dialog>
